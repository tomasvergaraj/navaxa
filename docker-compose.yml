services:
  postgres:
    image: postgres:16-alpine
    container_name: navaxa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-navaxa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-navaxa}
      POSTGRES_DB: ${POSTGRES_DB:-navaxa}
    ports:
      - "5432:5432"
    volumes:
      - navaxa_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-navaxa}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: navaxa-web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-navaxa}:${POSTGRES_PASSWORD:-navaxa}@postgres:5432/${POSTGRES_DB:-navaxa}?schema=public
      NODE_ENV: production
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
      # Scheduler interno de notificaciones (instancia única en VPS).
      INTERNAL_CRON: "true"
    ports:
      - "3000:3000"

  caddy:
    image: caddy:2-alpine
    container_name: navaxa-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
    profiles: ["prod"]

volumes:
  navaxa_pg:
  caddy_data:
  caddy_config:
