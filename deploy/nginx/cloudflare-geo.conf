# $cf_edge = 1 si la conexión TCP llegó desde un edge de Cloudflare (o loopback).
#
# Ojo con el orden: se evalúa contra $realip_remote_addr, o sea la IP del peer
# ANTES de que real_ip_header CF-Connecting-IP la reescriba. Contra $remote_addr
# daría 0 para todo el tráfico legítimo (ahí ya está la IP del visitante final).
# Si no hubo reescritura (hit directo al origen), $realip_remote_addr cae a
# $remote_addr, que es justo lo que queremos bloquear.
#
# Definir el geo en http no afecta a los otros vhosts del VPS: solo crea una
# variable. Quien la usa es el server block de navaxa.
geo $realip_remote_addr $cf_edge {
    default 0;

    127.0.0.1 1;
    ::1       1;

    173.245.48.0/20 1;
    103.21.244.0/22 1;
    103.22.200.0/22 1;
    103.31.4.0/22 1;
    141.101.64.0/18 1;
    108.162.192.0/18 1;
    190.93.240.0/20 1;
    188.114.96.0/20 1;
    197.234.240.0/22 1;
    198.41.128.0/17 1;
    162.158.0.0/15 1;
    104.16.0.0/13 1;
    104.24.0.0/14 1;
    172.64.0.0/13 1;
    131.0.72.0/22 1;
    2400:cb00::/32 1;
    2606:4700::/32 1;
    2803:f800::/32 1;
    2405:b500::/32 1;
    2405:8100::/32 1;
    2a06:98c0::/29 1;
    2c0f:f248::/32 1;
}
