# Proxy al contenedor del sandbox. Mismos headers de confianza neutralizados que
# en el vhost de producción: la app los lee como verdad (getTenantContext) y un
# valor "" hace que nginx no reenvíe el header aunque el cliente lo mande.
proxy_pass http://127.0.0.1:3005;
proxy_http_version 1.1;
proxy_set_header Host              $host;
proxy_set_header X-Real-IP         $remote_addr;
proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header CF-Connecting-IP  $remote_addr;
proxy_set_header Upgrade           $http_upgrade;
proxy_set_header Connection        "upgrade";
proxy_read_timeout 60s;

proxy_set_header X-Tenant-Id      "";
proxy_set_header X-User-Id        "";
proxy_set_header X-User-Role      "";
proxy_set_header X-Platform-Admin "";
proxy_set_header X-Auth-At        "";
proxy_set_header X-Middleware-Subrequest "";
