# navaxa.cl — proxy a contenedor docker navaxa-web (127.0.0.1:3004).
# TLS terminado aquí con cert Origin de Cloudflare (igual que nexofitness/vetapi).
# NO habilitar (symlink a sites-enabled) hasta que existan:
#   /etc/ssl/cloudflare/navaxa.cl.pem  y  /etc/ssl/cloudflare/navaxa.cl.key
# y el DNS de navaxa.cl apunte a este VPS en Cloudflare.

server {
    listen 80;
    listen [::]:80;
    server_name navaxa.cl www.navaxa.cl;
    return 301 https://navaxa.cl$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.navaxa.cl;

    ssl_certificate     /etc/ssl/cloudflare/navaxa.cl.pem;
    ssl_certificate_key /etc/ssl/cloudflare/navaxa.cl.key;

    return 301 https://navaxa.cl$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name navaxa.cl;

    ssl_certificate     /etc/ssl/cloudflare/navaxa.cl.pem;
    ssl_certificate_key /etc/ssl/cloudflare/navaxa.cl.key;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;

    # Backstop de subida. El tope real lo pone la app (lib/upload.ts): 8 MB la
    # foto de cliente, 4-6 MB el resto. Va en 9m y no en 8m para dejar aire al
    # framing multipart (boundaries + headers de parte), si no una foto de 8 MB
    # legítima moriría acá en vez de en el guard de la app.
    client_max_body_size 9m;

    # --- Origen solo alcanzable vía Cloudflare ---
    # Sin esto, pegarle directo a la IP del VPS con Host: navaxa.cl permite
    # inventar CF-Connecting-IP y con eso evadir los rate-limits de login
    # (lib/rate-limit.ts usa ese header como IP del cliente).
    # El include declara los rangos CF como confiables y reescribe $remote_addr;
    # el $cf_edge del geo (conf.d/cloudflare-geo.conf) mira $realip_remote_addr,
    # o sea la IP del peer real, para poder cortar los hits directos.
    include /etc/nginx/snippets/cloudflare-realip.conf;
    if ($cf_edge = 0) {
        return 403;
    }

    location / {
        proxy_pass http://127.0.0.1:3004;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Normalizado por nginx: acá $remote_addr ya es el valor que puso el edge
        # de CF (real_ip_header). Reescribirlo evita que un header inventado
        # llegue tal cual a clientIp() si algún día se abre otro camino al origen.
        proxy_set_header CF-Connecting-IP  $remote_addr;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 60s;

        # --- Headers de confianza: nunca deben venir del cliente ---
        # El middleware de Next los fija desde el JWT y la app los lee como
        # verdad (getTenantContext). Un valor "" hace que nginx NO reenvíe el
        # header, así que aunque alguien lo mande, al origen llega limpio.
        # Es defensa en profundidad: el middleware ya los pisa/borra, pero esto
        # tapa el hueco si mañana la matcher deja alguna ruta fuera.
        proxy_set_header X-Tenant-Id      "";
        proxy_set_header X-User-Id        "";
        proxy_set_header X-User-Role      "";
        proxy_set_header X-Platform-Admin "";
        proxy_set_header X-Auth-At        "";
        # CVE-2025-29927: este header saltaba el middleware entero en Next
        # < 14.2.25. La app ya está en 14.2.35, pero no cuesta nada cortarlo.
        proxy_set_header X-Middleware-Subrequest "";
    }
}
