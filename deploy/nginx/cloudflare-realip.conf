# Solo declara de quién nos fiamos + de qué header sacar la IP real. NO hace
# control de acceso: eso vive en el geo de conf.d/cloudflare-geo.conf, que mira
# $realip_remote_addr (la IP ANTES de la reescritura). Si se hiciera
# "allow <rangos CF>; deny all;" acá, el módulo access vería la IP del visitante
# ya reescrita por real_ip_header y bloquearía a todo el mundo.
